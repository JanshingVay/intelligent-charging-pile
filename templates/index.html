<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能充电桩调度计费系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .status-available { background-color: #d4edda; color: #155724; }
        .status-charging { background-color: #cce5ff; color: #004085; }
        .status-fault { background-color: #f8d7da; color: #721c24; }
        .pile-card { transition: transform 0.2s; }
        .pile-card:hover { transform: translateY(-2px); }
        .waiting-area-scroll { max-height: 300px; overflow-y: auto; }
        .nav-pills .nav-link.active { background-color: #0d6efd; color: white; }
        .queue-item { border-bottom: 1px dashed #dee2e6; padding: 8px 0; }
        .queue-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">智能充电桩系统</a>
            <div class="navbar-nav ms-auto" id="user-info">
                <span class="nav-link">未登录</span>
            </div>
        </div>
    </nav>

    <div class="container mt-4" id="app-container">
        <!-- 操作历史（页面顶部，始终可见） -->
        <div id="message-log" class="alert alert-info mb-4" role="alert">等待操作...</div>

        <!-- 登录 / 注册模块 -->
        <div id="login-section" class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">用户登录</div>
                    <div class="card-body">
                        <form id="login-form">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" id="login-user-id" value="user1">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" id="login-password" value="123456">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">登录</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">新用户注册</div>
                    <div class="card-body">
                        <form id="register-form">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" id="register-user-id" placeholder="请输入用户名">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" id="register-password" placeholder="请输入密码">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">用户类型</label>
                                <select class="form-select" id="register-role">
                                    <option value="user">普通用户</option>
                                    <option value="admin">管理员</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">注册</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主界面 -->
        <div id="main-section" style="display: none;">
            <!-- 顶部操作栏 -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <h5>欢迎，<span id="welcome-user-id"></span></h5>
                        </div>
                        <div class="col-md-6 text-end">
                            <button class="btn btn-secondary me-2" onclick="logout()">退出登录</button>
                            <button class="btn btn-warning d-none" id="toggle-admin-btn" onclick="toggleAdminMode()">进入管理员模式</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 标签页导航 -->
            <ul class="nav nav-pills mb-4" id="main-tabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="tab-charging" data-bs-toggle="pill" data-bs-target="#pane-charging" type="button" role="tab" aria-controls="pane-charging" aria-selected="true">充电与调度</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="tab-my-requests" data-bs-toggle="pill" data-bs-target="#pane-my-requests" type="button" role="tab" aria-controls="pane-my-requests" aria-selected="false">我的请求</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="tab-my-details" data-bs-toggle="pill" data-bs-target="#pane-my-details" type="button" role="tab" aria-controls="pane-my-details" aria-selected="false">我的详单</button>
                </li>
                <li class="nav-item ms-auto d-none" role="presentation" id="admin-tab-item">
                    <button class="nav-link" id="tab-admin" data-bs-toggle="pill" data-bs-target="#pane-admin" type="button" role="tab" aria-controls="pane-admin" aria-selected="false">管理员控制台</button>
                </li>
            </ul>

            <!-- 标签页内容 -->
            <div class="tab-content" id="main-tab-content">
                <!-- 充电与调度页 -->
                <div class="tab-pane fade show active" id="pane-charging" role="tabpanel" aria-labelledby="tab-charging">
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-header">提交充电请求</div>
                                <div class="card-body">
                                    <form id="charge-form">
                                        <div class="mb-3">
                                            <label class="form-label">充电模式</label>
                                            <select class="form-select" id="charge-mode">
                                                <option value="Fast">快充 (30kW)</option>
                                                <option value="Trickle">慢充 (10kW)</option>
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">需求电量 (kWh)</label>
                                            <input type="number" class="form-control" id="need-power" value="30" min="1">
                                        </div>
                                        <button type="submit" class="btn btn-success w-100" id="submit-request-btn">提交请求</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        
                        <div class="col-md-8">
                            <div class="card">
                                <div class="card-header">等候区</div>
                                <div class="card-body">
                                    <div id="my-queue-position" class="alert alert-info mb-3" style="display:none;"></div>
                                    <div class="waiting-area-scroll" id="waiting-area">
                                        <p class="text-muted">暂无等候请求</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card mb-4">
                        <div class="card-header">充电区</div>
                        <div class="card-body">
                            <div id="piles-grid" class="row g-3"></div>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-header">充电桩统计</div>
                                <div class="card-body" id="pile-stats"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-header">计费统计</div>
                                <div class="card-body" id="billing-stats"></div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-header">故障统计</div>
                                <div class="card-body" id="fault-stats"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 我的请求页 -->
                <div class="tab-pane fade" id="pane-my-requests" role="tabpanel" aria-labelledby="tab-my-requests">
                    <div class="card mb-4">
                        <div class="card-header">我的充电请求</div>
                        <div class="card-body" id="my-requests-list">
                            <p class="text-muted">暂无请求</p>
                        </div>
                    </div>
                </div>

                <!-- 我的详单页 -->
                <div class="tab-pane fade" id="pane-my-details" role="tabpanel" aria-labelledby="tab-my-details">
                    <div class="card mb-4">
                        <div class="card-header">我的充电详单</div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-striped table-hover" id="my-details-table">
                                    <thead>
                                        <tr>
                                            <th>详单编号</th>
                                            <th>充电桩编号</th>
                                            <th>充电电量</th>
                                            <th>启动时间</th>
                                            <th>停止时间</th>
                                            <th>充电费用</th>
                                            <th>服务费用</th>
                                            <th>总费用</th>
                                        </tr>
                                    </thead>
                                    <tbody id="my-details-tbody">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 管理员控制台 -->
                <div class="tab-pane fade" id="pane-admin" role="tabpanel" aria-labelledby="tab-admin">
                    <div class="row mb-4">
                        <div class="col-md-12">
                            <div class="card">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <span>报表统计</span>
                                    <div class="btn-group">
                                        <button class="btn btn-outline-primary btn-sm" onclick="refreshReports('daily')">日报</button>
                                        <button class="btn btn-outline-primary btn-sm" onclick="refreshReports('weekly')">周报</button>
                                        <button class="btn btn-outline-primary btn-sm" onclick="refreshReports('monthly')">月报</button>
                                    </div>
                                </div>
                                <div class="card-body">
                                    <div class="table-responsive">
                                        <table class="table table-striped table-hover">
                                            <thead>
                                                <tr>
                                                    <th>时段</th>
                                                    <th>充电桩编号</th>
                                                    <th>累计充电次数</th>
                                                    <th>累计充电时长 (h)</th>
                                                    <th>累计充电电量 (kWh)</th>
                                                    <th>累计充电费用</th>
                                                    <th>累计服务费用</th>
                                                    <th>累计总费用</th>
                                                </tr>
                                            </thead>
                                            <tbody id="reports-tbody">
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">故障调度策略</div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label class="form-label">选择调度模式</label>
                                        <select class="form-select" id="fault-dispatch-mode-select">
                                            <option value="priority">优先级调度</option>
                                            <option value="time">时间顺序调度</option>
                                        </select>
                                    </div>
                                    <button class="btn btn-primary w-100" onclick="setFaultDispatchMode()">保存设置</button>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">扩展调度（选做）</div>
                                <div class="card-body">
                                    <button class="btn btn-info w-100 mb-2" onclick="triggerMultiSpot()">单次多桩调度（总时长最短）</button>
                                    <button class="btn btn-secondary w-100" onclick="triggerBatch()">批量调度（总时长最短）</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card mb-4">
                        <div class="card-header">用户列表</div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-striped table-hover">
                                    <thead>
                                        <tr>
                                            <th>用户名</th>
                                            <th>角色</th>
                                        </tr>
                                    </thead>
                                    <tbody id="users-table-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="card mb-4">
                        <div class="card-header">充电桩队列详细信息</div>
                        <div class="card-body">
                            <div id="admin-piles-detail" class="row g-3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

    <!-- 修改请求模态框 -->
    <div class="modal fade" id="modify-request-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">修改充电请求</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="modify-request-form">
                        <input type="hidden" id="modify-request-id">
                        <div class="mb-3">
                            <label class="form-label">修改类型</label>
                            <select class="form-select" id="modify-opt-type">
                                <option value="power">修改需求电量</option>
                                <option value="mode">修改充电模式</option>
                            </select>
                        </div>
                        <div class="mb-3" id="modify-power-div">
                            <label class="form-label">新需求电量 (kWh)</label>
                            <input type="number" class="form-control" id="modify-new-power" value="30" min="1">
                        </div>
                        <div class="mb-3" id="modify-mode-div" style="display: none;">
                            <label class="form-label">新充电模式</label>
                            <select class="form-select" id="modify-new-mode">
                                <option value="Fast">快充</option>
                                <option value="Trickle">慢充</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="submitModifyRequest()">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 取消请求模态框 -->
    <div class="modal fade" id="cancel-request-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">取消充电请求</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="cancel-request-id">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rejoin-queue-check">
                        <label class="form-check-label" for="rejoin-queue-check">
                            取消后重新进入等候区排队（会重新生成排队号）
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消操作</button>
                    <button type="button" class="btn btn-danger" onclick="submitCancelRequest()">确认取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            refreshUserStatus();
            setInterval(refreshData, 3000);
        });

        let currentUserId = null;
        let isSubmitting = false;
        let isProcessing = false;
        let isAdminMode = false;

        const modifyRequestModal = new bootstrap.Modal(document.getElementById('modify-request-modal'));
        const cancelRequestModal = new bootstrap.Modal(document.getElementById('cancel-request-modal'));

        function showMessage(msg, type = 'info') {
            const logDiv = document.getElementById('message-log');
            const alertClass = type === 'error' ? 'alert-danger' : type === 'success' ? 'alert-success' : 'alert-info';
            logDiv.className = `alert ${alertClass}`;
            logDiv.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        }

        async function refreshUserStatus() {
            try {
                const response = await fetch('/api/user/status');
                const data = await response.json();
                updateUIByStatus(data);
            } catch (error) {
                console.error(error);
            }
        }

        function updateUIByStatus(data) {
            const loginSection = document.getElementById('login-section');
            const mainSection = document.getElementById('main-section');
            const userInfoDiv = document.getElementById('user-info');
            const adminBtn = document.getElementById('toggle-admin-btn');

            if (data.logged_in) {
                currentUserId = data.user_id;
                loginSection.style.display = 'none';
                mainSection.style.display = 'block';
                document.getElementById('welcome-user-id').textContent = currentUserId;
                userInfoDiv.innerHTML = `<span class="nav-link">用户: ${currentUserId} (${data.role === 'admin' ? '管理员' : '普通用户'})</span>`;
                
                if (data.role === 'admin') {
                    adminBtn.classList.remove('d-none');
                } else {
                    adminBtn.classList.add('d-none');
                }
                
                refreshData();
            } else {
                currentUserId = null;
                loginSection.style.display = 'block';
                mainSection.style.display = 'none';
                userInfoDiv.innerHTML = '<span class="nav-link">未登录</span>';
                adminBtn.classList.add('d-none');
            }
        }

        async function refreshData() {
            await Promise.all([
                refreshWaitingArea(),
                refreshChargingArea(),
                refreshPileStats(),
                refreshBillingStats(),
                refreshFaultStats(),
                refreshMyRequests(),
                refreshMyDetails(),
                refreshAdminPilesDetail(),
                refreshUsers(),
                refreshReports()
            ]);
        }

        // ========== 登录/注册 ==========
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const userId = document.getElementById('login-user-id').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, password: password })
                });
                
                const data = await response.json();
                if (data.success) {
                    showMessage(data.message, 'success');
                    refreshUserStatus();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('登录失败: ' + error, 'error');
            }
        });

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const userId = document.getElementById('register-user-id').value.trim();
            const password = document.getElementById('register-password').value.trim();
            const role = document.getElementById('register-role').value;
            
            if (!userId || !password) {
                showMessage('用户名和密码不能为空', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, password: password, role: role })
                });
                
                const data = await response.json();
                if (data.success) {
                    document.getElementById('register-user-id').value = '';
                    document.getElementById('register-password').value = '';
                    document.getElementById('login-user-id').value = userId;
                    showMessage(data.message, 'success');
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('注册失败: ' + error, 'error');
            }
        });

        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
                isAdminMode = false;
                refreshUserStatus();
                showMessage('已退出登录', 'success');
            } catch (error) {
                showMessage('退出失败: ' + error, 'error');
            }
        }

        // ========== 提交充电请求 ==========
        document.getElementById('charge-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (isSubmitting) {
                showMessage('正在处理中，请稍候...', 'info');
                return;
            }
            
            const chargeMode = document.getElementById('charge-mode').value;
            const needPower = parseFloat(document.getElementById('need-power').value);
            
            isSubmitting = true;
            const btn = document.getElementById('submit-request-btn');
            const originalText = btn.textContent;
            btn.textContent = '提交中...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/charge/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ charge_mode: chargeMode, need_power: needPower })
                });
                
                const data = await response.json();
                if (data.success) {
                    showMessage(data.message, 'success');
                    await Promise.all([refreshWaitingArea(), refreshChargingArea()]);
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('请求失败: ' + error, 'error');
            } finally {
                isSubmitting = false;
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // ========== 修改请求相关 ==========
        document.getElementById('modify-opt-type').addEventListener('change', function() {
            const optType = this.value;
            document.getElementById('modify-power-div').style.display = optType === 'power' ? 'block' : 'none';
            document.getElementById('modify-mode-div').style.display = optType === 'mode' ? 'block' : 'none';
        });

        function openModifyModal(requestId, currentMode, currentPower, canModifyMode) {
            document.getElementById('modify-request-id').value = requestId;
            document.getElementById('modify-new-power').value = currentPower;
            document.getElementById('modify-new-mode').value = currentMode;
            
            const optSelect = document.getElementById('modify-opt-type');
            if (!canModifyMode) {
                optSelect.innerHTML = '<option value="power">修改需求电量</option>';
            } else {
                optSelect.innerHTML = '<option value="power">修改需求电量</option><option value="mode">修改充电模式</option>';
            }
            document.getElementById('modify-opt-type').dispatchEvent(new Event('change'));
            modifyRequestModal.show();
        }

        async function submitModifyRequest() {
            const reqId = document.getElementById('modify-request-id').value;
            const optType = document.getElementById('modify-opt-type').value;
            const newMode = document.getElementById('modify-new-mode').value;
            const newPower = parseFloat(document.getElementById('modify-new-power').value);

            try {
                const response = await fetch(`/api/request/${reqId}/modify`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ opt_type: optType, charge_mode: newMode, need_power: newPower })
                });

                const data = await response.json();
                if (data.success) {
                    showMessage(data.message, 'success');
                    modifyRequestModal.hide();
                    refreshData();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('修改失败: ' + error, 'error');
            }
        }

        // ========== 等候区/充电区刷新 ==========
        async function refreshWaitingArea() {
            try {
                const response = await fetch('/api/waiting-area');
                const data = await response.json();
                const waitingDiv = document.getElementById('waiting-area');
                const myPositionDiv = document.getElementById('my-queue-position');
                
                // 计算用户自己的位置
                let myIndex = -1;
                for (let i = 0; i < data.requests.length; i++) {
                    if (data.requests[i].user_id === currentUserId) {
                        myIndex = i;
                        break;
                    }
                }
                
                if (myIndex >= 0) {
                    const aheadCount = myIndex;
                    myPositionDiv.style.display = 'block';
                    myPositionDiv.innerHTML = `
                        <strong>我的排队位置:</strong> 第 ${myIndex + 1} 位，前面有 ${aheadCount} 辆车在等候
                    `;
                } else {
                    myPositionDiv.style.display = 'none';
                }
                
                if (data.requests.length === 0) {
                    waitingDiv.innerHTML = '<p class="text-muted">暂无等候请求</p>';
                } else {
                    waitingDiv.innerHTML = data.requests.map(req => `
                        <div class="alert alert-info d-flex justify-content-between align-items-center mb-2">
                            <div>
                                <strong>${req.queue_number}</strong> - 用户: ${req.user_id} - 模式: ${req.charge_mode} - 电量: ${req.need_power}kWh
                            </div>
                            <div>
                                ${req.user_id === currentUserId ? `
                                    <button class="btn btn-sm btn-outline-primary me-1" onclick="openModifyModal('${req.request_id}', '${req.charge_mode}', ${req.need_power}, true)">修改</button>
                                    <button class="btn btn-sm btn-danger" onclick="cancelRequest('${req.request_id}')">取消</button>
                                ` : ''}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function refreshChargingArea() {
            try {
                const response = await fetch('/api/charging-area');
                const data = await response.json();
                const gridDiv = document.getElementById('piles-grid');
                
                gridDiv.innerHTML = data.piles.map(pile => `
                    <div class="col-md-4">
                        <div class="card pile-card status-${pile.status.toLowerCase()}">
                            <div class="card-body">
                                <h5 class="card-title">${pile.pile_id} (${pile.pile_type})</h5>
                                <p class="card-text">状态: ${pile.status}</p>
                                <p class="card-text">充电次数: ${pile.total_charge_count}</p>
                                <p class="card-text">总电量: ${pile.total_charge_power.toFixed(1)}kWh</p>
                                <div class="mb-2">
                                    <strong>队列 (${pile.queue.length}/${pile.max_queue_length}):</strong>
                                    <div class="small">
                                        ${pile.queue.map(q => `<span class="badge bg-secondary me-1">${q.queue_number}</span>`).join('') || '空'}
                                    </div>
                                </div>
                                <div class="btn-group w-100">
                                    ${pile.status === 'Charging' ? `
                                        <button class="btn btn-warning btn-sm" onclick="finishCharge('${pile.pile_id}')">完成充电</button>
                                    ` : ''}
                                    ${pile.status !== 'Fault' ? `
                                        <button class="btn btn-danger btn-sm" onclick="reportFault('${pile.pile_id}')">上报故障</button>
                                    ` : `
                                        <button class="btn btn-success btn-sm" onclick="resolveFault('${pile.pile_id}')">修复故障</button>
                                    `}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        }

        // ========== 统计刷新 ==========
        async function refreshPileStats() {
            try {
                const response = await fetch('/api/stats/piles');
                const data = await response.json();
                const statsDiv = document.getElementById('pile-stats');
                let statsHtml = '';
                for (const pile of data.piles) {
                    statsHtml += `
                        <div class="mb-2">
                            <strong>${pile.pile_id}:</strong> ${pile.total_charge_count}次, ${pile.total_charge_power.toFixed(1)}kWh
                        </div>
                    `;
                }
                statsDiv.innerHTML = statsHtml;
            } catch (error) {
                console.error(error);
            }
        }

        async function refreshBillingStats() {
            try {
                const response = await fetch('/api/stats/billing');
                const data = await response.json();
                const statsDiv = document.getElementById('billing-stats');
                statsDiv.innerHTML = `
                    <p>总交易数: ${data.total_transactions}</p>
                    <p>总充电电量: ${data.total_energy.toFixed(1)}kWh</p>
                    <p>总费用: ${data.total_fee.toFixed(2)}元</p>
                `;
            } catch (error) {
                console.error(error);
            }
        }

        async function refreshFaultStats() {
            try {
                const response = await fetch('/api/stats/faults');
                const data = await response.json();
                const statsDiv = document.getElementById('fault-stats');
                statsDiv.innerHTML = `
                    <p>总故障数: ${data.total_faults}</p>
                    <p>未解决: ${data.unresolved}</p>
                    <p>已解决: ${data.resolved}</p>
                `;
            } catch (error) {
                console.error(error);
            }
        }

        // ========== 我的请求和详单 ==========
        async function refreshMyRequests() {
            const div = document.getElementById('my-requests-list');
            if (!currentUserId) {
                div.innerHTML = '<p class="text-muted">请先登录</p>';
                return;
            }
            try {
                const response = await fetch('/api/user/requests');
                const data = await response.json();
                if (data.requests.length === 0) {
                    div.innerHTML = '<p class="text-muted">暂无请求</p>';
                } else {
                    div.innerHTML = data.requests.map(req => `
                        <div class="alert alert-secondary d-flex justify-content-between align-items-center mb-2">
                            <div>
                                <strong>${req.queue_number || 'N/A'}</strong> - 模式: ${req.charge_mode} - 电量: ${req.need_power}kWh - 状态: ${req.status}
                            </div>
                            <div>
                                ${req.status === 'Waiting' ? `
                                    <button class="btn btn-sm btn-outline-primary me-1" onclick="openModifyModal('${req.request_id}', '${req.charge_mode}', ${req.need_power}, true)">修改</button>
                                ` : ''}
                                ${['Waiting', 'Charging'].includes(req.status) ? `
                                    <button class="btn btn-sm btn-danger" onclick="cancelRequest('${req.request_id}')">取消</button>
                                ` : ''}
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function refreshMyDetails() {
            const tbody = document.getElementById('my-details-tbody');
            if (!currentUserId) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-muted text-center">请先登录</td></tr>';
                return;
            }
            try {
                const response = await fetch('/api/user/details');
                const data = await response.json();
                if (data.details.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-muted text-center">暂无详单</td></tr>';
                } else {
                    tbody.innerHTML = data.details.map(d => `
                        <tr>
                            <td>${d.detail_id}</td>
                            <td>${d.pile_id}</td>
                            <td>${d.energy_amount.toFixed(2)}kWh</td>
                            <td>${new Date(d.start_time).toLocaleString()}</td>
                            <td>${new Date(d.stop_time).toLocaleString()}</td>
                            <td>${d.charging_fee.toFixed(2)}元</td>
                            <td>${d.service_fee.toFixed(2)}元</td>
                            <td>${d.total_fee.toFixed(2)}元</td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error(error);
            }
        }

        // ========== 管理员功能 ==========
        function toggleAdminMode() {
            const btn = document.getElementById('toggle-admin-btn');
            const adminTabItem = document.getElementById('admin-tab-item');

            if (isAdminMode) {
                btn.textContent = '进入管理员模式';
                btn.className = 'btn btn-warning';
                adminTabItem.classList.add('d-none');
                document.getElementById('tab-charging').classList.add('active');
                document.getElementById('pane-charging').classList.add('show', 'active');
                document.getElementById('tab-admin').classList.remove('active');
                document.getElementById('pane-admin').classList.remove('show', 'active');
                isAdminMode = false;
                showMessage('已退出管理员模式', 'info');
            } else {
                btn.textContent = '退出管理员模式';
                btn.className = 'btn btn-danger';
                adminTabItem.classList.remove('d-none');
                isAdminMode = true;
                showMessage('已进入管理员模式', 'success');
                refreshFaultModeSelect();
                refreshReports();
            }
        }

        async function refreshFaultModeSelect() {
            try {
                const resp = await fetch('/api/system/fault-mode');
                const data = await resp.json();
                document.getElementById('fault-dispatch-mode-select').value = data.mode;
            } catch (error) {
                console.error(error);
            }
        }

        async function setFaultDispatchMode() {
            const mode = document.getElementById('fault-dispatch-mode-select').value;
            try {
                await fetch('/api/system/fault-mode', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: mode })
                });
                showMessage('调度模式已更新', 'success');
            } catch (error) {
                showMessage('更新失败: ' + error, 'error');
            }
        }

        async function triggerMultiSpot() {
            try {
                await fetch('/api/system/trigger-multispot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ charge_mode: 'Fast', count: 2 })
                });
                showMessage('单次多桩调度已执行', 'success');
                refreshData();
            } catch (error) {
                showMessage('执行失败: ' + error, 'error');
            }
        }

        async function triggerBatch() {
            try {
                await fetch('/api/system/trigger-batch', { method: 'POST' });
                showMessage('批量调度已执行', 'success');
                refreshData();
            } catch (error) {
                showMessage('执行失败: ' + error, 'error');
            }
        }

        async function refreshAdminPilesDetail() {
            const div = document.getElementById('admin-piles-detail');
            if (!isAdminMode) return;
            try {
                const response = await fetch('/api/charging-area');
                const data = await response.json();
                div.innerHTML = data.piles.map(pile => `
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">${pile.pile_id}</div>
                            <div class="card-body small">
                                <p><strong>状态:</strong> ${pile.status}</p>
                                <p><strong>当前充电:</strong> ${pile.current_charging ? pile.current_charging.user_id + ' (电池:' + (pile.current_charging.battery_capacity || 'N/A') + 'kWh, 需要:' + pile.current_charging.need_power + 'kWh)' : '无'}</p>
                                <p><strong>队列车辆:</strong></p>
                                <div>
                                    ${pile.queue.map(q => `
                                        <div class="queue-item">
                                            ${q.user_id} - 电池:${q.battery_capacity || 'N/A'}kWh - ${q.charge_mode} - ${q.need_power}kWh - ${q.queue_number}
                                        </div>
                                    `).join('') || '<span class="text-muted">无</span>'}
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        }

        async function refreshReports(period = 'daily') {
            const tbody = document.getElementById('reports-tbody');
            try {
                const response = await fetch(`/api/reports/${period}`);
                const data = await response.json();
                if (!data.success) {
                    tbody.innerHTML = `<tr><td colspan="8" class="text-muted text-center">${data.message}</td></tr>`;
                    return;
                }
                tbody.innerHTML = data.reports.map(r => `
                    <tr>
                        <td>${r.time_label}</td>
                        <td>${r.pile_id}</td>
                        <td>${r.count}</td>
                        <td>${r.duration.toFixed(2)}</td>
                        <td>${r.energy.toFixed(1)}</td>
                        <td>${r.charging_fee.toFixed(2)}</td>
                        <td>${r.service_fee.toFixed(2)}</td>
                        <td>${r.total_fee.toFixed(2)}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        }

        async function refreshUsers() {
            const tbody = document.getElementById('users-table-body');
            try {
                const response = await fetch('/api/users');
                const data = await response.json();
                if (data.success) {
                    tbody.innerHTML = data.users.map(user => `
                        <tr>
                            <td>${user.user_id}</td>
                            <td>${user.role === 'admin' ? '管理员' : '普通用户'}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = `<tr><td colspan="2" class="text-muted text-center">${data.message}</td></tr>`;
                }
            } catch (error) {
                console.error(error);
            }
        }

        // ========== 通用操作 ==========
        function openCancelModal(requestId) {
            document.getElementById('cancel-request-id').value = requestId;
            document.getElementById('rejoin-queue-check').checked = false;
            cancelRequestModal.show();
        }

        async function submitCancelRequest() {
            const reqId = document.getElementById('cancel-request-id').value;
            const rejoin = document.getElementById('rejoin-queue-check').checked;
            try {
                const response = await fetch(`/api/request/${reqId}/cancel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rejoin_queue: rejoin })
                });
                const data = await response.json();
                showMessage(data.message, data.success ? 'success' : 'error');
                cancelRequestModal.hide();
                refreshData();
            } catch (error) {
                showMessage('取消失败: ' + error, 'error');
            }
        }

        async function cancelRequest(reqId) {
            openCancelModal(reqId);
        }

        async function finishCharge(pileId) {
            if (isProcessing) return;
            isProcessing = true;
            try {
                const response = await fetch(`/api/pile/${pileId}/finish`, { method: 'POST' });
                const data = await response.json();
                showMessage(data.message, 'success');
                await refreshData();
            } catch (error) {
                showMessage('操作失败: ' + error, 'error');
            } finally {
                isProcessing = false;
            }
        }

        async function reportFault(pileId) {
            if (isProcessing) return;
            try {
                const faultInfo = prompt('请输入故障信息:');
                if (faultInfo) {
                    isProcessing = true;
                    const modeResp = await fetch('/api/system/fault-mode');
                    const modeData = await modeResp.json();
                    const response = await fetch(`/api/pile/${pileId}/fault`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fault_info: faultInfo, dispatch_strategy: modeData.mode })
                    });
                    const data = await response.json();
                    showMessage(data.message, 'success');
                    await refreshData();
                }
            } catch (error) {
                showMessage('操作失败: ' + error, 'error');
            } finally {
                isProcessing = false;
            }
        }

        async function resolveFault(pileId) {
            if (isProcessing) return;
            isProcessing = true;
            try {
                const response = await fetch(`/api/pile/${pileId}/resolve-fault`, { method: 'POST' });
                const data = await response.json();
                showMessage(data.message, 'success');
                await Promise.all([refreshChargingArea(), refreshFaultStats()]);
            } catch (error) {
                showMessage('操作失败: ' + error, 'error');
            } finally {
                isProcessing = false;
            }
        }
    </script>
</body>
</html>
